name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller clipbridge.spec
      
      - name: Create release asset
        run: |
          mkdir -p release/clipbridge-linux-x64
          cp dist/clipbridge release/clipbridge-linux-x64/
          cp install.sh release/clipbridge-linux-x64/
          chmod +x release/clipbridge-linux-x64/install.sh
          tar -czf clipbridge-linux-x64.tar.gz -C release clipbridge-linux-x64
          sha256sum clipbridge-linux-x64.tar.gz > clipbridge-linux-x64.tar.gz.sha256
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            clipbridge-linux-x64.tar.gz
            clipbridge-linux-x64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
